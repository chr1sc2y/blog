name: Sync About from GitHub profile README

on:
  schedule:
    # Daily at 17:13 UTC (~ 01:13 Beijing). Off-the-hour to avoid Actions
    # cron congestion (GitHub delays cron jobs scheduled on the hour).
    - cron: '13 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build candidate about.md from GitHub profile README
        run: |
          curl -fsSL https://raw.githubusercontent.com/chr1sc2y/chr1sc2y/main/README.md > /tmp/readme.md
          {
            echo '---'
            echo 'title: "About"'
            echo 'date: 2022-01-18T21:48:35+08:00'
            echo 'draft: false'
            echo 'showtoc: false'
            echo '---'
            echo
            cat /tmp/readme.md
            echo
            echo
            echo '### 📄 Resume'
            echo
            echo '- [English](/attachments/Resume_Zhengyu_Chen_EN_2026.pdf)'
            echo '- [简体中文](/attachments/陈正宇_简历_2026.pdf)'
          } > /tmp/about.md.new

      - name: Commit if changed
        run: |
          if diff -q content/about.md /tmp/about.md.new > /dev/null 2>&1; then
            echo "No diff against current content/about.md — nothing to do."
            exit 0
          fi

          mv /tmp/about.md.new content/about.md
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/about.md
          git commit -m "sync: update about from GitHub profile README"
          git push
